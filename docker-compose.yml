# ============================================================
# Brasileirão Analytics — Docker Compose
# ============================================================
# Sobe um container PostgreSQL 16 para armazenar a camada Gold.
# Uso: docker-compose up -d
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: brasileirao_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
